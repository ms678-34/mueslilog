<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>ZXing API Test</title></head>
<body>
<h2>ZXing API Diagnostic</h2>
<input type="file" id="f" accept="image/*"><br><br>
<pre id="out" style="font-size:12px;background:#f0f0f0;padding:10px;white-space:pre-wrap"></pre>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.2/umd/index.min.js"></script>
<script>
function log(msg) { document.getElementById('out').textContent += msg + '\n'; }

window.onload = () => {
  // Log what's available
  log('=== ZXing exports ===');
  for (const k of Object.keys(ZXing).sort()) {
    log('  ZXing.' + k + ' = ' + typeof ZXing[k]);
  }
  
  log('\n=== DecodeHintType keys ===');
  if (ZXing.DecodeHintType) {
    for (const k of Object.keys(ZXing.DecodeHintType)) log('  ' + k + ' = ' + ZXing.DecodeHintType[k]);
  }

  log('\n=== BrowserMultiFormatReader constructor args ===');
  try {
    const r = new ZXing.BrowserMultiFormatReader();
    log('  no-arg constructor: OK');
    log('  methods: ' + Object.getOwnPropertyNames(Object.getPrototypeOf(r)).join(', '));
  } catch(e) { log('  error: ' + e.message); }

  document.getElementById('f').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    log('\n=== Testing: ' + file.name + ' ===');
    
    const bitmap = await createImageBitmap(file, {imageOrientation:'from-image'});
    const canvas = document.createElement('canvas');
    canvas.width = bitmap.width; canvas.height = bitmap.height;
    canvas.getContext('2d').drawImage(bitmap, 0, 0);
    log('Canvas: ' + canvas.width + 'x' + canvas.height);

    // Test 1: plain decodeFromCanvas
    try {
      const r = new ZXing.BrowserMultiFormatReader();
      const res = r.decodeFromCanvas(canvas);
      log('Test1 (plain decodeFromCanvas): ' + res.getText());
    } catch(e) { log('Test1 FAIL: ' + e.name + ': ' + e.message); }

    // Test 2: hints in constructor
    try {
      const hints = new Map([[ZXing.DecodeHintType.TRY_HARDER, true]]);
      const r = new ZXing.BrowserMultiFormatReader(hints);
      const res = r.decodeFromCanvas(canvas);
      log('Test2 (hints constructor): ' + res.getText());
    } catch(e) { log('Test2 FAIL: ' + e.name + ': ' + e.message); }

    // Test 3: RGBLuminanceSource path
    try {
      const ctx = canvas.getContext('2d');
      const d = ctx.getImageData(0,0,canvas.width,canvas.height);
      const src = new ZXing.RGBLuminanceSource(d.data, canvas.width, canvas.height);
      const bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(src));
      const hints = new Map([[ZXing.DecodeHintType.TRY_HARDER, true]]);
      const r = new ZXing.MultiFormatReader();
      r.setHints(hints);
      const res = r.decode(bmp);
      log('Test3 (MultiFormatReader+hints): ' + res.getText());
    } catch(e) { log('Test3 FAIL: ' + e.name + ': ' + e.message); }

    // Test 4: decodeFromImageData if it exists
    try {
      const r = new ZXing.BrowserMultiFormatReader();
      const ctx = canvas.getContext('2d');
      const d = ctx.getImageData(0,0,canvas.width,canvas.height);
      const res = r.decodeFromImageData ? r.decodeFromImageData(d) : 'method not available';
      log('Test4 (decodeFromImageData): ' + (res.getText ? res.getText() : res));
    } catch(e) { log('Test4 FAIL: ' + e.name + ': ' + e.message); }
  };
};
</script>
</body>
</html>
