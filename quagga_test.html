<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quagga2 Test</title>
<style>body{font-family:sans-serif;padding:16px;font-size:13px;}pre{background:#f0f0f0;padding:10px;white-space:pre-wrap;}</style>
</head>
<body>
<h2>Quagga2 Diagnostic</h2>
<input type="file" id="f" accept="image/*"><br><br>
<div id="out"></div>
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
<script>
function log(msg) {
  const p = document.createElement('pre');
  p.textContent = msg;
  document.getElementById('out').appendChild(p);
}

document.getElementById('f').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('out').innerHTML = '';
  log('File: ' + file.name + ', ' + (file.size/1024).toFixed(0) + 'KB');

  // Load as dataURL
  const dataUrl = await new Promise(res => {
    const r = new FileReader();
    r.onload = ev => res(ev.target.result);
    r.readAsDataURL(file);
  });

  // Check Quagga loaded
  log('Quagga available: ' + (typeof Quagga !== 'undefined'));

  // Try decodeSingle with the image
  Quagga.decodeSingle({
    decoder: {
      readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'upc_e_reader', 'code_128_reader']
    },
    locate: true,
    src: dataUrl
  }, function(result) {
    if (result && result.codeResult) {
      log('✓ FOUND: ' + result.codeResult.code + ' (format: ' + result.codeResult.format + ')');
    } else {
      log('✗ Not found. result=' + JSON.stringify(result && result.codeResult));
    }
  });
};
</script>
</body>
</html>
