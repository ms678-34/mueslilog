<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Müslilog"/>
  <meta name="theme-color" content="#ffffff"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <title>Müslilog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F5F7; --surface: #FFFFFF; --border: #E4E4E7;
      --text: #09090B; --sub: #71717A; --hint: #A1A1AA;
      --accent: #16A34A; --accent-l: #DCFCE7; --accent-d: #14532D;
      --star: #F59E0B; --red: #DC2626; --red-l: #FEE2E2;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
      --r: 14px; --r-sm: 10px;
    }
    html, body { height: 100%; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; color: var(--text); -webkit-font-smoothing: antialiased; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100%; }

    .header { background: rgba(255,255,255,.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: calc(14px + var(--safe-top)) 20px 14px; position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 20px; font-weight: 800; letter-spacing: -.02em; display: flex; align-items: center; gap: 8px; }
    .header-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .header-count { font-size: 12px; font-weight: 500; color: var(--sub); background: var(--bg); padding: 4px 10px; border-radius: 20px; }
    .back-btn { background: none; border: none; color: var(--accent); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; padding: 0; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 16px 0; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--hint); margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 800; letter-spacing: -.03em; }
    .stat-value span { font-size: 14px; font-weight: 500; color: var(--sub); }

    .list { padding: 12px 0 100px; }
    .empty { text-align: center; padding: 80px 32px; }
    .empty-icon { font-size: 56px; margin-bottom: 18px; }
    .empty-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; letter-spacing: -.02em; }
    .empty-sub { font-size: 14px; color: var(--sub); line-height: 1.6; }
    .empty-sub strong { color: var(--accent); }

    .card { background: var(--surface); margin: 0 16px 10px; border-radius: var(--r); border: 1px solid var(--border); overflow: hidden; display: flex; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.06); -webkit-tap-highlight-color: transparent; transition: transform .12s; height: 78px; }
    .card:active { transform: scale(.985); }
    .card-thumb { width: 78px; height: 78px; flex-shrink: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 30px; overflow: hidden; }
    .card-thumb img { width: 78px; height: 78px; object-fit: cover; display: block; }
    .card-body { flex: 1; padding: 0 14px; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 3px; }
    .card-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-score { font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .card-brand { font-size: 12px; color: var(--sub); margin-bottom: 6px; }
    .card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pill { font-size: 11px; font-weight: 600; border-radius: 20px; padding: 3px 8px; }
    .pill-green { background: var(--accent-l); color: var(--accent-d); }
    .pill-gray { background: var(--bg); color: var(--sub); border: 1px solid var(--border); }
    .card-date { font-size: 11px; color: var(--hint); margin-left: auto; }

    .stars { display: flex; gap: 2px; }
    .star { color: var(--border); line-height: 1; transition: color .1s; }
    .star.on { color: var(--star); }
    .star.tap { cursor: pointer; }
    .star.tap:active { transform: scale(1.3); }

    .fab { position: fixed; bottom: calc(24px + var(--safe-bot)); right: max(20px, calc(50% - 220px)); width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 14px rgba(22,163,74,.4); display: flex; align-items: center; justify-content: center; z-index: 40; -webkit-tap-highlight-color: transparent; transition: transform .15s; }
    .fab:active { transform: scale(.9); }

    .form-page { padding: 20px 16px calc(110px + var(--safe-bot)); }
    .form-title { font-size: 22px; font-weight: 800; letter-spacing: -.03em; margin-bottom: 22px; }
    .scan-btn { width: 100%; padding: 14px; border-radius: var(--r); background: var(--accent); color: #fff; border: none; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; -webkit-tap-highlight-color: transparent; transition: opacity .15s; }
    .scan-btn:active { opacity: .85; }
    .scan-btn.loading { opacity: .65; pointer-events: none; }
    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--border); }
    .divider span { font-size: 12px; font-weight: 600; color: var(--hint); text-transform: uppercase; letter-spacing: .06em; }
    .field-group { margin-bottom: 14px; }
    .lbl { font-size: 12px; font-weight: 600; color: var(--sub); margin-bottom: 6px; display: block; }
    .inp { width: 100%; padding: 12px 14px; border-radius: var(--r-sm); border: 1.5px solid var(--border); background: var(--surface); font-size: 15px; color: var(--text); font-family: inherit; outline: none; transition: border-color .15s; -webkit-appearance: none; }
    .inp:focus { border-color: var(--accent); }
    textarea.inp { min-height: 86px; resize: vertical; }
    .star-pick { display: flex; gap: 6px; padding: 4px 0; }
    .star-pick .star { font-size: 34px; cursor: pointer; transition: transform .12s; }
    .star-pick .star:active { transform: scale(1.25); }
    .photo-zone { border: 2px dashed var(--border); border-radius: var(--r-sm); padding: 24px; text-align: center; cursor: pointer; background: var(--bg); transition: border-color .15s; -webkit-tap-highlight-color: transparent; }
    .photo-zone:active { border-color: var(--accent); }
    .photo-zone .pz-icon { font-size: 30px; margin-bottom: 8px; }
    .photo-zone .pz-hint { font-size: 13px; color: var(--sub); }
    .photo-zone img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 8px; }
    .btn-primary { width: 100%; padding: 15px; border-radius: var(--r); background: var(--accent); color: #fff; border: none; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 8px; -webkit-tap-highlight-color: transparent; transition: opacity .15s; }
    .btn-primary:active { opacity: .85; }
    .btn-primary:disabled { opacity: .5; pointer-events: none; }
    .btn-secondary { width: 100%; padding: 14px; border-radius: var(--r); background: transparent; color: var(--sub); border: 1.5px solid var(--border); font-size: 15px; font-family: inherit; font-weight: 500; cursor: pointer; margin-top: 10px; }
    .btn-del { color: var(--red); border-color: var(--red-l); }

    .detail-hero { width: 100%; height: 240px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 80px; }
    .detail-hero img { width: 100%; height: 240px; object-fit: cover; display: block; }
    .detail-body { padding: 20px; }
    .detail-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
    .detail-name { font-size: 26px; font-weight: 800; letter-spacing: -.03em; flex: 1; }
    .detail-brand-badge { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; color: var(--sub); white-space: nowrap; }
    .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0 18px; }
    .detail-note { background: var(--bg); border-radius: var(--r-sm); padding: 14px 16px; font-size: 14px; color: var(--sub); line-height: 1.7; margin-bottom: 20px; font-style: italic; }
    .detail-score { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .detail-score-num { font-size: 36px; font-weight: 800; letter-spacing: -.04em; }
    .detail-score-num span { font-size: 18px; color: var(--hint); }

    .loading-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(255,255,255,.88); backdrop-filter: blur(8px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; font-weight: 600; color: var(--sub); }

    /* Setup screen */
    .setup-screen { padding: 32px 24px; }
    .setup-title { font-size: 22px; font-weight: 800; letter-spacing: -.03em; margin-bottom: 8px; }
    .setup-sub { font-size: 14px; color: var(--sub); line-height: 1.7; margin-bottom: 28px; }
    .setup-step { display: flex; gap: 14px; margin-bottom: 20px; }
    .setup-num { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-l); color: var(--accent-d); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .setup-step-body { flex: 1; }
    .setup-step-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .setup-step-desc { font-size: 13px; color: var(--sub); line-height: 1.6; }
    .setup-step-desc a { color: var(--accent); text-decoration: none; }
    .setup-code { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px; font-family: monospace; font-size: 12px; color: var(--text); margin-top: 8px; white-space: pre; overflow-x: auto; line-height: 1.7; }

    .toast { position: fixed; bottom: calc(88px + var(--safe-bot)); left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 500; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,.2); animation: popUp .18s ease; }
    @keyframes popUp { from { opacity:0; transform:translateX(-50%) translateY(8px); } }

    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--hint); display: inline-block; vertical-align: middle; transition: background .3s; }
    .sync-dot.ok  { background: var(--accent); }
    .sync-dot.err { background: var(--red); }

    /* ── SORT BAR ── */
    .sort-bar { display: flex; gap: 6px; padding: 10px 16px 2px; overflow-x: auto; scrollbar-width: none; }
    .sort-bar::-webkit-scrollbar { display: none; }
    .sort-chip { flex-shrink: 0; font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--surface); color: var(--sub); cursor: pointer; white-space: nowrap; transition: all .15s; -webkit-tap-highlight-color: transparent; }
    .sort-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .page { animation: fadeUp .2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } }
  </style>
</head>
<body>
<div id="app"></div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<!-- Quagga2 for barcode decoding -->
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>

<script>
// ══════════════════════════════════════════════════════
//  🔥 FIREBASE KONFIGURATION
//  Der API Key ist durch HTTP-Referrer-Beschränkungen
//  auf deine Domain limitiert (siehe Anleitung unten).
// ══════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyC1OKKFjAFaQl9CKqNOncN9MqpDJk7OuRQ",
  authDomain:        "mueslilog.firebaseapp.com",
  projectId:         "mueslilog",
  storageBucket:     "mueslilog.firebasestorage.app",
  messagingSenderId: "571424078415",
  appId:             "1:571424078415:web:63e801ee690fdbe69ac83a"
};

const USE_DB = !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId);

// Global error handler — always show something instead of blank page
window.onerror = (msg, src, line) => {
  const app = document.getElementById('app');
  if (app && !app.innerHTML.trim()) {
    app.innerHTML = `<div style="padding:32px 24px;font-family:sans-serif;">
      <div style="font-size:20px;font-weight:700;margin-bottom:8px;">Fehler beim Laden</div>
      <div style="font-size:14px;color:#666;line-height:1.7;margin-bottom:16px;">${msg}<br><small>${src} Zeile ${line}</small></div>
      <div style="font-size:13px;color:#888;">Öffne die Browser-Konsole (F12 / Safari Entwickler-Tools) für Details.</div>
    </div>`;
  }
};

// Firebase init — wrapped so a load failure never crashes the page
let db   = null;
let auth = null;
if (USE_DB) {
  try {
    if (typeof firebase === 'undefined') throw new Error('Firebase SDK nicht geladen – Netzwerkproblem?');
    firebase.initializeApp(FIREBASE_CONFIG);
    db   = firebase.firestore();
    auth = firebase.auth();
  } catch(e) {
    console.error('Firebase init:', e);
  }
}

const COLLECTION = 'riegel';

async function dbLoad() {
  const snap = await db.collection(COLLECTION).get();
  const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  // Sort client-side by createdAt descending (most recent first)
  return docs.sort((a, b) => {
    const ta = a.createdAt?.seconds || 0;
    const tb = b.createdAt?.seconds || 0;
    return tb - ta;
  });
}

async function dbInsert(entry) {
  const { id, ...data } = entry;
  data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
  const ref = await db.collection(COLLECTION).add(data);
  return { ...data, id: ref.id };
}

async function dbUpdate(id, entry) {
  const { id: _, createdAt, ...data } = entry;
  await db.collection(COLLECTION).doc(id).update(data);
  return { ...entry, id };
}

async function dbDelete(id) {
  await db.collection(COLLECTION).doc(id).delete();
}

// ─── State ────────────────────────────────────────────
const LS = 'mueslilog-v2';
let riegel    = [];
let syncOk    = null;
let view      = 'list';
let selectedId = null;
let editMode  = false;
let form      = blank();
let toastTimer = null;
let sortKey   = 'bewertung_desc'; // default: Bewertung absteigend

function blank() { return { name:'', marke:'', bewertung:0, preis:'', gekauft:'', notizen:'', foto:null }; }
function lsSave() { try { localStorage.setItem(LS, JSON.stringify(riegel)); } catch(e) {} }
function lsLoad() { try { return JSON.parse(localStorage.getItem(LS)||'[]'); } catch(e) { return []; } }

// ─── Boot ─────────────────────────────────────────────
async function boot() {
  if (!USE_DB) {
    riegel = lsLoad();
    render();
    return;
  }
  // Show local data immediately while we authenticate
  riegel = lsLoad();
  render();
  // Sign in anonymously — required by Firestore security rules
  // Silent and automatic, user sees nothing
  try {
    if (auth && !auth.currentUser) {
      await auth.signInAnonymously();
    }
  } catch(e) {
    console.warn('Auth error:', e);
  }
  try {
    riegel = await dbLoad();
    lsSave();
    syncOk = true;
  } catch(e) {
    syncOk = false;
    console.warn('Firebase error:', e);
  }
  render();
}

// ─── Render ───────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!app) return;
  app.innerHTML = '';
  // Show setup screen only if config is completely empty
  if (!USE_DB) { app.appendChild(mkSetupScreen()); return; }
  // If config is set but db init failed, show error
  if (!db) {
    app.innerHTML = `<div style="padding:32px 24px;font-family:sans-serif;">
      <div style="font-size:20px;font-weight:700;margin-bottom:8px;">Firebase konnte nicht verbunden werden</div>
      <div style="font-size:14px;color:#666;line-height:1.7;">Mögliche Ursachen:<br>• Falscher API Key oder Project ID<br>• Firestore noch nicht aktiviert<br>• Netzwerkproblem<br><br>Öffne die Konsole (F12) für Details.</div>
    </div>`;
    return;
  }
  app.appendChild(mkHeader());
  if      (view === 'list')   { if (riegel.length) { app.appendChild(mkStats()); app.appendChild(mkSortBar()); } app.appendChild(mkList()); app.appendChild(mkFab()); }
  else if (view === 'add')    { app.appendChild(mkForm()); }
  else if (view === 'detail') { app.appendChild(mkDetail()); }
}

function goBack() { view='list'; editMode=false; form=blank(); render(); }

// ─── Setup screen (shown when Firebase not configured) ─
function mkSetupScreen() {
  const wrap = div('setup-screen page');
  wrap.innerHTML = `
    <div class="setup-title">🔥 Firebase einrichten</div>
    <div class="setup-sub">Füge deine Firebase-Konfiguration in die <code>index.html</code> ein, damit die App deine Daten speichert.</div>

    <div class="setup-step">
      <div class="setup-num">1</div>
      <div class="setup-step-body">
        <div class="setup-step-title">Firebase-Projekt erstellen</div>
        <div class="setup-step-desc">Gehe auf <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> → "Projekt hinzufügen" → Namen eingeben → Projekt erstellen.</div>
      </div>
    </div>

    <div class="setup-step">
      <div class="setup-num">2</div>
      <div class="setup-step-body">
        <div class="setup-step-title">Firestore aktivieren</div>
        <div class="setup-step-desc">Im linken Menü → "Firestore Database" → "Datenbank erstellen" → "Im Testmodus starten" → Region wählen → Aktivieren.</div>
      </div>
    </div>

    <div class="setup-step">
      <div class="setup-num">3</div>
      <div class="setup-step-body">
        <div class="setup-step-title">Web-App registrieren</div>
        <div class="setup-step-desc">Projektübersicht → Web-Icon (&lt;/&gt;) → App-Namen eingeben → Registrieren. Du bekommst dann ein <code>firebaseConfig</code>-Objekt.</div>
      </div>
    </div>

    <div class="setup-step">
      <div class="setup-num">4</div>
      <div class="setup-step-body">
        <div class="setup-step-title">Config in index.html eintragen</div>
        <div class="setup-step-desc">Öffne <code>index.html</code> und ersetze die leeren Werte im <code>FIREBASE_CONFIG</code>-Block ganz oben im Script:</div>
        <div class="setup-code">const FIREBASE_CONFIG = {
  apiKey:            "AIzaSy...",
  authDomain:        "mein-projekt.firebaseapp.com",
  projectId:         "mein-projekt",
  storageBucket:     "mein-projekt.appspot.com",
  messagingSenderId: "123456789",
  appId:             "1:123:web:abc123"
};</div>
      </div>
    </div>

    <div class="setup-step">
      <div class="setup-num">5</div>
      <div class="setup-step-body">
        <div class="setup-step-title">Auf GitHub pushen</div>
        <div class="setup-step-desc">Datei speichern → in GitHub Repository hochladen → GitHub Pages deployed automatisch → fertig!</div>
      </div>
    </div>
  `;
  return wrap;
}

// ─── Header ───────────────────────────────────────────
function mkHeader() {
  const h = div('header'), inner = div('header-inner');
  if (view === 'list') {
    const t = div('header-title');
    t.innerHTML = '<span class="dot"></span> Müslilog';
    const d = el('span', 'sync-dot'+(syncOk===true?' ok':syncOk===false?' err':''));
    d.title = syncOk===true ? 'Mit Firebase verbunden' : syncOk===false ? 'Offline – lokale Daten' : 'Verbinde…';
    t.appendChild(d);
    inner.appendChild(t);
    if (riegel.length) { const c = div('header-count'); c.textContent = riegel.length+' Riegel'; inner.appendChild(c); }
  } else {
    const b = el('button','back-btn'); b.textContent='← Zurück'; b.onclick=goBack; inner.appendChild(b);
  }
  h.appendChild(inner); return h;
}

// ─── Stats ────────────────────────────────────────────
function mkStats() {
  const avg = (riegel.reduce((a,r)=>a+r.bewertung,0)/riegel.length).toFixed(1);
  const best = riegel.reduce((a,b)=>b.bewertung>a.bewertung?b:a, riegel[0]);
  const w = div('stats page');
  w.innerHTML = `
    <div class="stat-card"><div class="stat-label">Durchschnitt</div><div class="stat-value">${avg} <span>/ 5</span></div></div>
    <div class="stat-card"><div class="stat-label">Bester Riegel</div><div class="stat-value" style="font-size:14px;margin-top:2px;line-height:1.3">${esc(best.name)}</div></div>`;
  return w;
}

// ─── Sort ─────────────────────────────────────────────
const SORT_OPTIONS = [
  { key: 'bewertung_desc', label: '★ Beste zuerst' },
  { key: 'bewertung_asc',  label: '★ Schlechteste zuerst' },
  { key: 'preis_asc',      label: '💰 Preis aufsteigend' },
  { key: 'preis_desc',     label: '💰 Preis absteigend' },
  { key: 'gekauft_asc',    label: '📍 Ort A–Z' },
  { key: 'datum_desc',     label: '🕐 Neueste zuerst' },
  { key: 'datum_asc',      label: '🕐 Älteste zuerst' },
];

function parsePreis(str) {
  if (!str) return Infinity;
  const n = parseFloat(str.replace(',', '.').replace(/[^0-9.]/g, ''));
  return isNaN(n) ? Infinity : n;
}

function sortedRiegel() {
  const arr = [...riegel];
  switch (sortKey) {
    case 'bewertung_desc': return arr.sort((a,b) => b.bewertung - a.bewertung);
    case 'bewertung_asc':  return arr.sort((a,b) => a.bewertung - b.bewertung);
    case 'preis_asc':      return arr.sort((a,b) => parsePreis(a.preis) - parsePreis(b.preis));
    case 'preis_desc':     return arr.sort((a,b) => parsePreis(b.preis) - parsePreis(a.preis));
    case 'gekauft_asc':    return arr.sort((a,b) => (a.gekauft||'').localeCompare(b.gekauft||'', 'de'));
    case 'datum_desc':     return arr.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
    case 'datum_asc':      return arr.sort((a,b) => (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0));
    default: return arr;
  }
}

function mkSortBar() {
  const bar = div('sort-bar');
  SORT_OPTIONS.forEach(opt => {
    const chip = div('sort-chip' + (sortKey === opt.key ? ' active' : ''));
    chip.textContent = opt.label;
    chip.onclick = () => { sortKey = opt.key; render(); };
    bar.appendChild(chip);
  });
  return bar;
}

// ─── List ─────────────────────────────────────────────
function mkList() {
  const wrap = div('list page');
  if (!riegel.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🌾</div><div class="empty-title">Noch keine Einträge</div><div class="empty-sub">Tippe auf <strong>+</strong> und scanne deinen ersten Müsliriegel!</div></div>`;
    return wrap;
  }
  sortedRiegel().forEach(r => {
    const card = div('card');
    const thumb = div('card-thumb');
    if (r.foto) { const img=el('img'); img.src=r.foto; img.alt=''; thumb.appendChild(img); }
    else thumb.textContent = '🍫';
    const body = div('card-body');
    body.innerHTML = `
      <div class="card-top"><div class="card-name">${esc(r.name)}</div><div class="card-score">${r.bewertung}★</div></div>
      ${r.marke?`<div class="card-brand">${esc(r.marke)}</div>`:''}
      <div class="card-meta">
        ${r.preis?`<span class="pill pill-green">💰 ${esc(r.preis)}</span>`:''}
        ${r.gekauft?`<span class="pill pill-gray">📍 ${esc(r.gekauft)}</span>`:''}
        <span class="card-date">${r.datum||''}</span>
      </div>`;
    card.appendChild(thumb); card.appendChild(body);
    card.onclick = () => { selectedId=r.id; view='detail'; render(); };
    wrap.appendChild(card);
  });
  return wrap;
}

function mkFab() {
  const b = el('button','fab'); b.textContent='+';
  b.onclick = () => { form=blank(); editMode=false; view='add'; render(); };
  return b;
}

// ─── Form ─────────────────────────────────────────────
function mkForm() {
  const wrap = div('form-page page');
  const title = div('form-title'); title.textContent = editMode?'✏️ Bearbeiten':'🆕 Neuer Eintrag';
  wrap.appendChild(title);

  if (!editMode) {
    const fi = el('input'); fi.id='barcode-fi'; fi.type='file'; fi.accept='image/*'; fi.capture='environment'; fi.style.display='none';
    fi.onchange = e => { if (e.target.files[0]) handleBarcodeImage(e.target.files[0]); };
    wrap.appendChild(fi);
    const sb = el('button','scan-btn'); sb.id='scan-btn';
    sb.innerHTML = '<span>📷</span> Barcode scannen';
    sb.onclick = () => { document.getElementById('barcode-fi').value=''; document.getElementById('barcode-fi').click(); };
    wrap.appendChild(sb);
    const dv = div('divider'); dv.innerHTML='<span>oder manuell eingeben</span>'; wrap.appendChild(dv);
  }

  wrap.appendChild(mkField('Name *','text','z.B. Hafer-Schoko-Riegel','name'));
  wrap.appendChild(mkField('Marke','text','z.B. Nature Valley','marke'));

  const sg = div('field-group'), sl = el('label','lbl'); sl.textContent='Bewertung *';
  const sp = div('star-pick');
  [1,2,3,4,5].forEach(v => {
    const s = el('span','star tap'+(v<=form.bewertung?' on':'')); s.textContent='★'; s.style.fontSize='34px';
    s.onclick = () => { form.bewertung=v; render(); };
    sp.appendChild(s);
  });
  sg.appendChild(sl); sg.appendChild(sp); wrap.appendChild(sg);

  wrap.appendChild(mkField('Preis','decimal','z.B. 1,49 €','preis'));
  wrap.appendChild(mkField('Wo gekauft','text','z.B. Spar, Billa, DM…','gekauft'));

  const ng = div('field-group'), nl = el('label','lbl'); nl.textContent='Notizen';
  const ta = el('textarea','inp'); ta.placeholder='Geschmack, Textur, Empfehlung…'; ta.value=form.notizen; ta.oninput=e=>form.notizen=e.target.value;
  ng.appendChild(nl); ng.appendChild(ta); wrap.appendChild(ng);

  const pg = div('field-group'), pl = el('label','lbl'); pl.textContent='Foto';
  const pz = div('photo-zone');
  const pfi = el('input'); pfi.type='file'; pfi.accept='image/*'; pfi.capture='environment'; pfi.style.display='none';
  pfi.onchange = e => { if (e.target.files[0]) compressFile(e.target.files[0]).then(d=>{ form.foto=d; render(); }); };
  if (form.foto) { const img=el('img'); img.src=form.foto; pz.appendChild(img); }
  else pz.innerHTML='<div class="pz-icon">📷</div><div class="pz-hint">Produktfoto hinzufügen</div>';
  pz.onclick = () => pfi.click();
  pg.appendChild(pl); pg.appendChild(pz); pg.appendChild(pfi); wrap.appendChild(pg);

  const sv = el('button','btn-primary'); sv.id='save-btn';
  sv.textContent = editMode?'Änderungen speichern':'Riegel eintragen ✓';
  sv.onclick = handleSave; wrap.appendChild(sv);

  const cn = el('button','btn-secondary'); cn.textContent='Abbrechen'; cn.onclick=goBack; wrap.appendChild(cn);
  return wrap;
}

function mkField(label,type,placeholder,key) {
  const g=div('field-group'), l=el('label','lbl'); l.textContent=label;
  const i=el('input','inp'); i.type=type; i.placeholder=placeholder; i.value=form[key]||'';
  i.oninput=e=>form[key]=e.target.value;
  g.appendChild(l); g.appendChild(i); return g;
}

// ─── Save ─────────────────────────────────────────────
async function handleSave() {
  if (!form.name.trim()) { toast('⚠️ Bitte Name eingeben'); return; }
  if (!form.bewertung)   { toast('⚠️ Bitte Bewertung vergeben ★'); return; }
  const btn = document.getElementById('save-btn');
  if (btn) { btn.disabled=true; btn.textContent='Speichern…'; }
  try {
    if (editMode) {
      const saved = await dbUpdate(form.id, form);
      riegel = riegel.map(r => r.id===form.id ? saved : r);
    } else {
      const entry = {...form, datum: new Date().toLocaleDateString('de-DE')};
      const saved = await dbInsert(entry);
      riegel.unshift(saved);
    }
    lsSave();
    const msg = editMode?'Gespeichert ✓':'Riegel eingetragen ✓';
    view='list'; editMode=false; form=blank(); render(); toast(msg);
  } catch(e) {
    console.error(e);
    if (btn) { btn.disabled=false; btn.textContent=editMode?'Änderungen speichern':'Riegel eintragen ✓'; }
    toast('Fehler beim Speichern');
  }
}

// ─── Detail ───────────────────────────────────────────
function mkDetail() {
  const r = riegel.find(x=>x.id===selectedId);
  if (!r) { view='list'; render(); return div(''); }
  const wrap = div('page');
  const hero = div('detail-hero');
  if (r.foto) { const img=el('img'); img.src=r.foto; img.alt=''; hero.appendChild(img); }
  else hero.textContent='🍫';
  wrap.appendChild(hero);
  const body = div('detail-body');
  const top=div('detail-top'), nm=div('detail-name'); nm.textContent=r.name; top.appendChild(nm);
  if (r.marke) { const b=div('detail-brand-badge'); b.textContent=r.marke; top.appendChild(b); }
  body.appendChild(top);
  const sc=div('detail-score'); sc.innerHTML=`<div class="detail-score-num">${r.bewertung}<span>/5</span></div>`;
  const st=div('stars'); st.innerHTML=starsHtml(r.bewertung,20); sc.appendChild(st); body.appendChild(sc);
  const tags=div('detail-tags');
  if (r.preis)   tags.innerHTML+=`<span class="pill pill-green">💰 ${esc(r.preis)}</span>`;
  if (r.gekauft) tags.innerHTML+=`<span class="pill pill-gray">📍 ${esc(r.gekauft)}</span>`;
  if (r.datum)   tags.innerHTML+=`<span class="pill pill-gray">📅 ${r.datum}</span>`;
  body.appendChild(tags);
  if (r.notizen) { const n=div('detail-note'); n.textContent='„'+r.notizen+'"'; body.appendChild(n); }
  const eb=el('button','btn-primary'); eb.textContent='✏️ Bearbeiten';
  eb.onclick=()=>{ form={...r}; editMode=true; view='add'; render(); }; body.appendChild(eb);
  const db2=el('button','btn-secondary btn-del'); db2.textContent='🗑️ Löschen';
  db2.onclick=async()=>{
    if (!confirm(`"${r.name}" wirklich löschen?`)) return;
    try { await dbDelete(r.id); riegel=riegel.filter(x=>x.id!==r.id); lsSave(); view='list'; render(); toast('Gelöscht'); }
    catch(e) { toast('Fehler beim Löschen'); }
  }; body.appendChild(db2);
  wrap.appendChild(body); return wrap;
}

// ─── Barcode (Quagga2) ────────────────────────────────

async function handleBarcodeImage(file) {
  const btn = document.getElementById('scan-btn');
  const setBtn = (txt) => {
    if (!btn) return;
    btn.classList.toggle('loading', !!txt);
    btn.innerHTML = txt || '<span>📷</span> Barcode scannen';
  };
  setBtn('<span>⏳</span> Bild wird analysiert…');
  try {
    const code = await decodeWithQuagga(file);
    setBtn(null);
    if (code) {
      await lookupBarcode(code);
    } else {
      toast('Kein Barcode erkannt – Barcode flach halten und gut beleuchten');
    }
  } catch(e) {
    console.error('Barcode error:', e);
    setBtn(null);
    toast('Fehler beim Verarbeiten des Fotos');
  }
}

function decodeWithQuagga(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      Quagga.decodeSingle({
        decoder: {
          readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'upc_e_reader', 'code_128_reader']
        },
        locate: true,
        src: ev.target.result
      }, (result) => {
        if (result && result.codeResult && result.codeResult.code) {
          resolve(result.codeResult.code);
        } else {
          resolve(null);
        }
      });
    };
    reader.readAsDataURL(file);
  });
}



async function lookupBarcode(barcode) {
  showLoading('Produkt wird gesucht…');
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const data = await res.json();
    if (data.status!==1) { hideLoading(); toast('Produkt nicht gefunden – manuell eingeben'); return; }
    const p = data.product;
    form.name  = p.product_name_de || p.product_name || '';
    form.marke = p.brands || '';
    const imgUrl = p.image_front_small_url || p.image_front_url || p.image_url;
    if (imgUrl) { try { form.foto = await fetchAndCompress(imgUrl); } catch(e) {} }
    hideLoading();
    toast('Produkt gefunden: '+(form.name||barcode));
    render();
  } catch(e) { hideLoading(); toast('Netzwerkfehler – bitte manuell eingeben'); }
}

// ─── Image helpers ────────────────────────────────────
const fileToDataUrl = f => new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(f); });
const compressFile  = f => fileToDataUrl(f).then(d=>compressDataUrl(d,400,.75));
async function fetchAndCompress(url) {
  const res=await fetch(url); const blob=await res.blob();
  return compressDataUrl(await fileToDataUrl(blob),400,.75);
}
function compressDataUrl(dataUrl, maxW, q) {
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas'); c.width=Math.round(img.width*ratio); c.height=Math.round(img.height*ratio);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',q));
    };
    img.onerror=()=>res(dataUrl); img.src=dataUrl;
  });
}

function showLoading(txt) { const l=div('loading-overlay'); l.id='loading-overlay'; l.innerHTML=`<div class="spinner"></div><div class="loading-text">${esc(txt)}</div>`; document.body.appendChild(l); }
function hideLoading()     { const l=document.getElementById('loading-overlay'); if(l) l.remove(); }
function starsHtml(v,sz)   { return [1,2,3,4,5].map(s=>`<span class="star ${s<=v?'on':''}" style="font-size:${sz}px">★</span>`).join(''); }
function div(cls)  { const d=document.createElement('div'); if(cls) d.className=cls; return d; }
function el(t,cls) { const e=document.createElement(t); if(cls) e.className=cls; return e; }
function esc(s)    { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){ const ex=document.querySelector('.toast'); if(ex) ex.remove(); clearTimeout(toastTimer); const t=div('toast'); t.textContent=msg; document.body.appendChild(t); toastTimer=setTimeout(()=>t.remove(),2600); }

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
boot();
